<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>New Contact Form Submission</title></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2 style="color: #2563eb;">New Contact Form Submission</h2>
  <table style="width: 100%; border-collapse: collapse;">
    <tr><td style="padding: 8px; font-weight: bold; width: 100px;">From:</td><td style="padding: 8px;">{{name}} &lt;{{email}}&gt;</td></tr>
    <tr><td style="padding: 8px; font-weight: bold;">Message:</td><td style="padding: 8px; white-space: pre-wrap;">{{message}}</td></tr>
    <tr><td style="padding: 8px; font-weight: bold;">Received:</td><td style="padding: 8px;">{{receivedAt}}</td></tr>
  </table>
  <hr style="margin: 20px 0;">
  <p style="color: #6b7280; font-size: 12px;">This message was sent via the Chativa contact form at chativa.pro</p>
</body>
</html>
